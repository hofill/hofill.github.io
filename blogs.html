---
layout: default
title: Blogs
---

<div>
  <div class="flex items-center gap-3 mb-10">
    <h1 class="font-mono text-[10px] font-semibold text-rose uppercase tracking-[0.14em] shrink-0">Blogs</h1>
    <div class="flex-1 border-t border-line"></div>
  </div>

  <div class="space-y-8">
    {% for post in site.categories.blog %}
    <div class="group pb-8 border-b border-line last:border-0">
      <a href="{{ post.url | relative_url }}" class="block">
        <h2 class="font-mono text-sm text-body group-hover:text-teal transition-colors mb-1 leading-snug">{{ post.title }}</h2>
        <time class="font-mono text-[10px] text-muted">{{ post.date | date_to_string }}</time>
        {% if post.summary %}
        <p class="text-[12.5px] text-dim mt-2 leading-relaxed">
          <span class="text-amber font-mono">&gt;&gt;&gt;</span> {{ post.summary | strip_html }}
        </p>
        {% endif %}
      </a>
    </div>
    {% endfor %}
  </div>
</div>
