---
layout: default
title: Blogs
---

<div>
  <div class="flex items-center gap-3 mb-10">
    <span class="font-mono text-[10px] font-semibold text-rose uppercase tracking-[0.18em] shrink-0">Blogs</span>
    <div class="flex-1 border-t border-[#333333]"></div>
  </div>

  <div class="space-y-0">
    {% for post in site.categories.blog %}
    <div class="group py-6 border-b border-[#1e1e1e] first:border-t first:border-[#1e1e1e]">
      <a href="{{ post.url | relative_url }}" class="flex items-start justify-between gap-6 group">
        <div class="flex-1 min-w-0">
          <h2 class="font-mono text-[13px] font-medium text-body group-hover:text-teal transition-colors mb-1 leading-snug">{{ post.title }}</h2>
          {% if post.summary %}
          <p class="text-[12px] text-dim leading-relaxed mt-1">
            <span class="text-amber font-mono text-[11px]">&gt;&gt;&gt;</span> {{ post.summary | strip_html }}
          </p>
          {% endif %}
        </div>
        <time class="font-mono text-[10px] text-muted shrink-0 mt-0.5">{{ post.date | date: "%b %Y" }}</time>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
