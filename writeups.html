---
layout: default
title: Writeups
permalink: /writeups
---

<div>
  <div class="flex items-center gap-3 mb-10">
    <span class="font-mono text-[10px] font-semibold text-rose uppercase tracking-[0.18em] shrink-0">Writeups</span>
    <div class="flex-1 border-t border-[#333333]"></div>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-px bg-[#1e1e1e]">
    {% for category in site.data.challenge-categories %}
    <a href="/writeups/{{ category.name }}"
       class="group flex flex-col items-center justify-center gap-3 p-8 bg-canvas hover:bg-surface transition-colors duration-150">
      <img class="opacity-50 group-hover:opacity-90 transition-opacity duration-200" style="width:2rem;height:2rem;object-fit:contain;border-radius:0;margin:0;border:0" src="{{ category.image }}" alt="{{ category.name }}">
      <span class="font-mono text-[11px] text-muted group-hover:text-body transition-colors text-center leading-tight">{{ category.name }}</span>
    </a>
    {% endfor %}
  </div>
</div>
