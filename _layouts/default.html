<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
{% include head.html %}
<body class="bg-canvas text-body font-sans antialiased min-h-screen flex flex-col">

  <nav class="sticky top-0 z-50 bg-canvas border-b border-line">
    <div class="max-w-4xl mx-auto px-5 flex items-center justify-between h-[52px]">
      <a href="/" class="font-mono text-sm font-medium hover:opacity-75 transition-opacity shrink-0">
        <span class="text-teal">hofill</span><span class="text-muted"> &gt; </span><span class="text-dim">./blog</span>
      </a>
      <div class="flex items-center gap-0.5 ml-4">
        {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"
           class="font-mono text-[11px] px-2.5 py-1.5 rounded-sm transition-colors {% if page.url == item.url %}text-teal{% else %}text-dim hover:text-body{% endif %}">
          {{ item.title | downcase }}
        </a>
        {% endfor %}
        <div class="w-px h-3.5 bg-line mx-1.5"></div>
        {% for social in site.data.social %}
        <a href="{{ social.url }}" target="_blank"
           class="w-7 h-7 flex items-center justify-center text-muted hover:text-teal transition-colors text-xs">
          <i class="{{ social.icon | default: 'fas fa-link' }}" title="{{ social.title }}"></i>
        </a>
        {% endfor %}
      </div>
    </div>
  </nav>

  <main class="flex-1 max-w-4xl mx-auto w-full px-5 py-10">
    {{ content }}
  </main>

  <footer class="border-t border-line mt-auto">
    <div class="max-w-4xl mx-auto px-5 py-5 flex items-center justify-between">
      <span class="font-mono text-[11px] text-muted">
        &copy; {{ site.time | date: '%Y' }}
        <a href="{{ site.author.url }}" target="_blank" class="text-teal hover:opacity-75 transition-opacity">{{ site.author.name }}</a>
      </span>
      <span class="font-mono text-[11px] text-muted">all rights reserved.</span>
    </div>
  </footer>

</body>
</html>
